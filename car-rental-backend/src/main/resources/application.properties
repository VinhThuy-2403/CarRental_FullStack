spring.application.name=carrental
spring.profiles.active=dev

# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/car_rental_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=your-super-secret-key-at-least-256-bits-long-change-this
app.jwt.access-expiration=3600000
app.jwt.refresh-expiration=604800000

# Cloudinary
cloudinary.cloud-name=your_cloud_name
cloudinary.api-key=your_api_key
cloudinary.api-secret=your_api_secret

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# VNPay (đăng ký tại sandbox.vnpayment.vn)
vnpay.tmn-code=YOUR_TMN_CODE
vnpay.hash-secret=YOUR_HASH_SECRET
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${app.base-url}/api/v1/payments/vnpay/callback
vnpay.ipn-url=${app.base-url}/api/v1/payments/vnpay/ipn
 
# MoMo (đăng ký tại business.momo.vn/developer)
momo.partner-code=YOUR_PARTNER_CODE
momo.access-key=YOUR_ACCESS_KEY
momo.secret-key=YOUR_SECRET_KEY
momo.api-url=https://test-payment.momo.vn/v2/gateway/api/create
momo.return-url=${app.base-url}/payment/result
momo.notify-url=${app.base-url}/api/v1/payments/momo/callback



# App base url
app.base-url=http://localhost:5173